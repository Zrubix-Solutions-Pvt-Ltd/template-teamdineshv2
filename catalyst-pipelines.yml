version: 1.0

jobs:
  deploy_and_notify:
    steps:
      - echo "── Starting Pipeline for $GITHUB_REPO ──"
      # Build Stage
      - cd $APP_PATH
      - npm install
      - npm run build
      - cd ..
      # Deployment Stage
      - echo "── Installing Catalyst CLI ──"
      - npm install -g zcatalyst-cli
      - echo "── Deploying to Zoho Catalyst ──"
      - catalyst deploy
      # Notification Stage (Trigger V1)
      - echo "── Executing Trigger Logic ──"
      - chmod +x scripts/trigger_template_v1.sh
      - scripts/trigger_template_v1.sh

stages:
  - name: deploy-zoho-catalyst
    jobs:
      - deploy_and_notify